name: Telemetry Submission
description: Submit anonymized telemetry from skill_telemetry_submit. DO NOT file manually — use the skill to generate and sanitize the payload.
labels: ["telemetry"]
body:
  - type: markdown
    attributes:
      value: |
        ## SpaceLattice.aDNA Telemetry

        This form enforces the telemetry schema from `what/standard/telemetry_schema.json` (ADR-009).

        **Before submitting:**
        - Run `skill_telemetry_submit` to generate and sanitize your payload
        - The skill validates the payload against the JSON Schema before letting you submit
        - No personal data, hostnames, or real paths should appear in the payload

        **Schema reference:** [telemetry_schema.json](../../blob/master/what/standard/telemetry_schema.json)

  - type: dropdown
    id: submission_class
    attributes:
      label: Submission class
      description: Must match the `type` field in your JSON payload
      options:
        - friction_signal
        - adr_proposal
        - customization_share
        - perf_metric
    validations:
      required: true

  - type: textarea
    id: payload
    attributes:
      label: JSON payload
      description: |
        Paste the full sanitized JSON payload here. Generated by `skill_telemetry_submit`.
        Must validate against `what/standard/telemetry_schema.json` (schema_version: "1.0").
      placeholder: |
        ```json
        {
          "type": "friction_signal",
          "schema_version": "1.0",
          "spacemacs_sha": "e57594e7",
          "os": "darwin",
          ...
        }
        ```
      render: json
    validations:
      required: true

  - type: checkboxes
    id: sanitization_confirmation
    attributes:
      label: Sanitization confirmation
      options:
        - label: I ran the sanitization scan (`skill_telemetry_submit` Step 3) and it returned PASS
          required: true
        - label: I ran schema validation (`skill_telemetry_submit` Step 4) and it returned PASS
          required: true
        - label: I reviewed the full payload preview and confirm no personal data is included
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **Maintainer note:** Issues filed here are processed by `skill_telemetry_aggregate` (ADR-011 pending).
        Malformed submissions will be labeled `telemetry-malformed` and skipped during aggregation.
